---
- name: Configure host.
  hosts: all

  vars_files:
    - default.config.yml

  pre_tasks:
    - name: Include playbook configuration overrides.
      ansible.builtin.include_vars: "{{ item }}"
      with_fileglob:
        - "{{ playbook_dir }}/config.yml"
      tags: ['always']

  roles:
    - role: elliotweiser.osx-command-line-tools
      tags: ['xcode']
    - role: geerlingguy.mac.homebrew
      tags: ['homebrew']
    - role: geerlingguy.dotfiles
      when: configure_dotfiles
      tags: ['dotfiles']
    - role: geerlingguy.mac.mas
      when: mas_installed_apps | default([]) | length > 0
      tags: ['mas']
    - role: geerlingguy.mac.dock
      when: configure_dock
      tags: ['dock']

  tasks:
    - name: Configure sudoers.
      ansible.builtin.import_tasks: tasks/sudoers.yml
      when: configure_sudoers
      tags: ['sudoers']

    - name: Configure macOS defaults.
      ansible.builtin.import_tasks: tasks/osx-defaults.yml
      when: configure_osx
      tags: ['osx']

    - name: Configure shell environment.
      ansible.builtin.import_tasks: tasks/shell-setup.yml
      when: configure_shell
      tags: ['shell']

    - name: Configure Node.js via NVM.
      ansible.builtin.import_tasks: tasks/node-setup.yml
      when: configure_node
      tags: ['node']

    - name: Configure Rust toolchain and cargo packages.
      ansible.builtin.import_tasks: tasks/rust-setup.yml
      when: configure_rust
      tags: ['rust']

    - name: Configure Go development tools.
      ansible.builtin.import_tasks: tasks/go-tools.yml
      when: configure_go_tools
      tags: ['go']

    - name: Configure pipx packages.
      ansible.builtin.import_tasks: tasks/pipx-setup.yml
      when: configure_pipx
      tags: ['pipx']

    - name: Configure GPG signing key.
      ansible.builtin.import_tasks: tasks/gpg-setup.yml
      when: configure_gpg
      tags: ['gpg']

    - name: Configure Alfred.
      ansible.builtin.import_tasks: tasks/alfred-setup.yml
      when: configure_alfred
      tags: ['alfred']

    - name: Run post-provision task files in a block.
      tags: ['post']
      block:
        - name: Run configured post-provision ansible task files.
          ansible.builtin.include_tasks: "{{ outer_item }}"
          loop_control:
            loop_var: outer_item
          with_fileglob: "{{ post_provision_tasks | default(omit) }}"
