---
downloads: ~/.ansible-downloads/

configure_dotfiles: true

configure_osx: true
configure_node: true
configure_shell: true
configure_rust: true
configure_go_tools: true
configure_pipx: true

# Set to 'true' to configure the Dock via dockutil.
configure_dock: true
dockitems_remove:
  - Launchpad
  - TV
  - Podcasts
  - "App Store"
  - Safari
  - Messages
  - Mail
  - Maps
  - Photos
  - FaceTime
  - Calendar
  - Contacts
  - Reminders
  - Notes
  - Music
  - News
  - Freeform
  - Keynote
  - Numbers
  - Pages
  - iPhone Mirroring
dockitems_persist:
  - name: "System Settings"
    path: "/System/Applications/System Settings.app/"
    pos: 1

configure_sudoers: true
sudoers_custom_config: |
  # Allow users in admin group to use sudo with no password.
  %admin ALL=(ALL) NOPASSWD: ALL

dotfiles_repo: git@github.com:dotCipher/dotfiles.git
dotfiles_repo_version: main
dotfiles_repo_accept_hostkey: true
dotfiles_repo_local_destination: ~/Workspace/personal/dotfiles
dotfiles_files:
  - .actrc
  - .bash_aliases
  - .bash_env
  - .bash_profile
  - .bashrc
  - .config
  - .gitconfig
  - .gnupg
  - .osx
  - .profile
  - .tmux.conf
  - .vimrc
  - .zprofile
  - .zshenv

# Default Node.js version to install via NVM.
node_default_version: "20"

homebrew_installed_packages:
  # Core CLI tools
  - git
  - gh
  - bash-completion
  - coreutils
  - gnu-sed
  - tree
  - wget
  - pv
  - p7zip
  - ripgrep
  - bat
  - eza
  - jq
  - yq
  - jd
  - fclones
  - exiftool
  - rclone
  - pandoc
  - cowsay
  - mas

  - ansible

  # Networking / security
  - nmap
  - iperf
  - ssh-copy-id
  - gnupg
  - pinentry-mac
  - httpie
  - doctl

  # Shell
  - fish
  - tmux
  - zoxide

  # Languages & runtimes
  - go
  - kotlin
  - rustup
  - python@3.13
  - pyenv
  - nvm
  - pipx
  - poetry
  - virtualenv

  # Go tooling
  - golang-migrate
  - golangci-lint
  - gotestsum

  # Static analysis / security scanning
  - semgrep

  # Build tools
  - cmake
  - binutils
  - pre-commit
  - prettier
  - act

  # DevOps / Infrastructure
  - hashicorp/tap/terraform
  - terragrunt
  - warrensbox/tap/tfswitch
  - jsonnet
  - helm
  - k9s
  - kind
  - kustomize
  - awscli

  # Data / services
  - redis
  - postgresql@14
  - rabbitmq
  - libpq
  - supabase/tap/supabase

  # Media / document processing
  - ffmpeg
  - imagemagick
  - poppler
  - portaudio
  - testdisk

  # Misc dev tools
  - mike-engel/jwt-cli/jwt-cli
  - go-task
  - git-filter-repo
  - yarn
  - vim
  - ollama
  - aria2
  - livekit
  - anomalyco/tap/opencode
  - mongodb-atlas-cli
  - render

homebrew_taps:
  - hashicorp/tap
  - mike-engel/jwt-cli
  - go-task/tap
  - warrensbox/tap
  - supabase/tap
  - anomalyco/tap

homebrew_cask_appdir: /Applications
homebrew_cask_apps:
  # Browsers
  - google-chrome
  - chromedriver

  # Terminals & editors
  - alacritty
  - zed
  - visual-studio-code
  - jetbrains-toolbox
  - cursor

  # Productivity & utilities
  - alfred
  - rectangle
  - 1password

  # Communication
  - slack
  - discord
  - messenger
  - telegram
  - whatsapp

  # Development
  - docker
  - postman
  - postman-cli
  - bruno
  - dbeaver-community
  - mongodb-compass
  - github

  # Media & creative
  - spotify
  - audacity
  - audible
  - blackhole-2ch
  - iina
  - obs

  # Security & networking
  - nordvpn
  - keeper-password-manager

  # Fonts
  - font-hack-nerd-font
  - font-karla

  # Productivity
  - notion
  - todoist
  - linear-linear
  - google-drive

  # AI tools
  - codex
  - chatgpt
  - claude

  # Crypto / finance
  - exodus
  - ledger-live

  # Security / hardware
  - yubico-yubikey-manager
  - keymapp

  # Virtualization & system tools
  - utm
  - flux
  - dockutil
  - balenaetcher
  - basictex
  - macfuse

# See `geerlingguy.mas` role documentation for usage instructions.
mas_installed_apps:
  - id: 1475387142
    name: "Tailscale"

mas_email: ""
mas_password: ""

# Cargo crates to install via `cargo install`.
cargo_packages:
  - cargo-deny
  - cargo-llvm-cov
  - cargo-tarpaulin

# Go tools to install via `go install`.
go_tools:
  - golang.org/x/tools/gopls@latest
  - mvdan.cc/gofumpt@latest
  - dario.cat/gci@latest
  - honnef.co/go/tools/cmd/staticcheck@latest
  - golang.org/x/vuln/cmd/govulncheck@latest
  - github.com/go-delve/delve/cmd/dlv@latest
  - github.com/getsops/sops/v3/cmd/sops@latest

# Global npm packages to install after Node.js setup.
npm_global_packages:
  - pnpm
  - newman

# Python packages to install via pipx.
pipx_packages:
  - vastai
  - wandb

# Glob pattern to ansible task files to run after all other tasks are finished.
post_provision_tasks: []
