---
- name: Get Fish shell path.
  ansible.builtin.command: which fish
  register: fish_path
  changed_when: false
  failed_when: false

- name: Ensure Fish is in /etc/shells.
  ansible.builtin.lineinfile:
    path: /etc/shells
    line: "{{ fish_path.stdout }}"
    state: present
  become: true
  when: fish_path.rc == 0

- name: Check current default shell.
  ansible.builtin.command: "dscl . -read /Users/{{ ansible_user_id }} UserShell"
  register: current_shell
  changed_when: false
  failed_when: false
  become: false

- name: Set Fish as default shell.
  ansible.builtin.command: "chsh -s {{ fish_path.stdout }} {{ ansible_user_id }}"
  become: true
  when:
    - fish_path.rc == 0
    - fish_path.stdout not in (current_shell.stdout | default(''))

- name: Install Fisher plugin manager for Fish.
  ansible.builtin.shell: |
    set -o pipefail
    {{ fish_path.stdout }} -c '
      if not functions -q fisher
        curl -sL https://raw.githubusercontent.com/jorgebucaran/fisher/main/functions/fisher.fish | source
        fisher install jorgebucaran/fisher
      end
    '
  become: false
  changed_when: false
  when: fish_path.rc == 0
  args:
    executable: /bin/bash

- name: Install Fish plugins from fish_plugins.
  ansible.builtin.shell: |
    {{ fish_path.stdout }} -c '
      if test -f {{ ansible_env.HOME }}/.config/fish/fish_plugins
        fisher update
      end
    '
  become: false
  changed_when: false
  when: fish_path.rc == 0
  args:
    executable: /bin/bash

- name: Install uv (Python package manager).
  ansible.builtin.shell: |
    set -o pipefail
    curl -LsSf https://astral.sh/uv/install.sh | sh
  args:
    executable: /bin/bash
    creates: "{{ ansible_env.HOME }}/.local/bin/uv"
  become: false

- name: Initialize atuin database (first-run setup).
  ansible.builtin.shell: |
    set -o pipefail
    {{ ansible_env.HOME }}/.cargo/bin/atuin 2>/dev/null || \
    /opt/homebrew/bin/atuin init bash >/dev/null 2>&1 || true
  args:
    executable: /bin/bash
    creates: "{{ ansible_env.HOME }}/.local/share/atuin/history.db"
  become: false
  failed_when: false

- name: Ensure SSH directory exists with correct permissions.
  ansible.builtin.file:
    path: "{{ ansible_env.HOME }}/.ssh"
    state: directory
    mode: '0700'
  become: false

- name: Ensure base SSH config exists (1Password agent).
  ansible.builtin.copy:
    content: |
      Host *
        IdentityAgent "~/.1password/agent.sock"
    dest: "{{ ansible_env.HOME }}/.ssh/config"
    mode: '0600'
    force: false
  become: false
