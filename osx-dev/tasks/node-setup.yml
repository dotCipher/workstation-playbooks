---
- name: Ensure NVM directory exists.
  ansible.builtin.file:
    path: "{{ ansible_env.HOME }}/.nvm"
    state: directory
    mode: '0755'
  become: false

- name: Check if default Node version is installed via NVM.
  ansible.builtin.shell: |
    export NVM_DIR="{{ ansible_env.HOME }}/.nvm"
    [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
    nvm ls {{ node_default_version }} 2>/dev/null
  register: nvm_node_check
  changed_when: false
  failed_when: false
  become: false
  args:
    executable: /bin/bash

- name: Install default Node version via NVM.
  ansible.builtin.shell: |
    export NVM_DIR="{{ ansible_env.HOME }}/.nvm"
    [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
    nvm install {{ node_default_version }}
    nvm alias default {{ node_default_version }}
  when: nvm_node_check.rc != 0 or node_default_version not in (nvm_node_check.stdout | default(''))
  become: false
  changed_when: true
  args:
    executable: /bin/bash

- name: Install global npm packages.
  ansible.builtin.shell: |
    export NVM_DIR="{{ ansible_env.HOME }}/.nvm"
    [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
    if ! npm ls -g {{ item }} --depth=0 >/dev/null 2>&1; then
      npm install -g {{ item }}
    fi
  loop: "{{ npm_global_packages | default([]) }}"
  become: false
  changed_when: false
  args:
    executable: /bin/bash
